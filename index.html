<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متاهة جود - المحاكاة النفسية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700&display=swap" rel="stylesheet">

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background-color: #050505;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            transition: opacity 2s ease;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }

        #crosshair::before {
            width: 14px;
            height: 1px;
        }

        #crosshair::after {
            width: 1px;
            height: 14px;
        }

        /* Sleek Glassmorphism UI */
        #inventory-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            height: 50px;
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            font-size: 1.2rem;
            gap: 15px;
            font-weight: 700;
            z-index: 5;
            color: #ccc;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .inv-item {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 12px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #instruction-screen {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: #ddd;
            text-align: center;
        }

        #instruction-screen h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 2px;
            font-weight: 900;
        }

        #instruction-screen p {
            font-size: 1.3rem;
            line-height: 2.2;
            font-weight: 400;
            color: #aaa;
            max-width: 600px;
        }

        .click-to-start {
            margin-top: 50px;
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1.4rem;
            font-family: 'Cairo';
            font-weight: 700;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .click-to-start:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-container {
            width: 90%;
            max-width: 700px;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(25px);
            padding: 50px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        #story-text {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 40px;
            line-height: 2;
            color: #eaeaea;
            min-height: 80px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.4rem;
            background-color: #ffaa00;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-right: 5px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: rgba(255, 255, 255, 0.02);
            color: #d0d0d0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 25px;
            font-size: 1.3rem;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            border-radius: 15px;
            transition: all 0.2s ease;
            font-weight: 700;
            text-align: right;
            opacity: 0;
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .love-letter {
            font-family: 'Amiri', 'Georgia', serif;
            font-size: 1.3rem;
            color: #3b2818;
            line-height: 2.2;
            direction: rtl;
            background: #f4e8c1;
            background-image: 
                radial-gradient(circle, transparent 20%, #e0ce9a 120%),
                url('https://www.transparenttextures.com/patterns/aged-paper.png');
            border-radius: 2px;
            padding: 50px 10%;
            box-shadow: inset 0 0 50px rgba(100,60,20,0.4), 0 15px 40px rgba(0,0,0,0.8);
            max-width: 800px;
            width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #8c6a46 transparent;
            margin: auto;
        }

        .love-letter::-webkit-scrollbar { width: 8px; }
        .love-letter::-webkit-scrollbar-track { background: transparent; }
        .love-letter::-webkit-scrollbar-thumb { background: rgba(140, 106, 70, 0.7); border-radius: 4px; }

        .option-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #feedback {
            margin-top: 25px;
            font-size: 1.3rem;
            font-weight: 700;
            min-height: 30px;
            color: #ff5555;
            letter-spacing: 1px;
        }

        .love-letter {
            font-size: 1.6rem;
            line-height: 2.4;
            color: #fff;
            text-align: center;
            padding: 40px;
        }

        #interaction-toast {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            display: none;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>
    <div id="crosshair"></div>
    <div id="interaction-toast">انقر للتبصر</div>

    <div id="inventory-bar">المخزون: <span id="inv-items">لا يوجد</span></div>

    <div id="instruction-screen">
        <h1>متاهة جود الداخلية</h1>
        <p>مرحباً بك في المعرض النفسي المجرد.<br><br> هنا لا توجد أشياء مادية.. بل تجسيد للمشاعر والذكريات. تحرك
            باستخدام <strong>W A S D</strong> وانظر حولك باستخدام الفأرة. عندما ترى جسماً مضيئاً، حدق فيه وانقر متى ما
            شعرت بأنك مستعد لفك الشفرة.</p>
        <button class="click-to-start" id="start-btn">بدء الاستكشاف</button>
    </div>

    <div id="overlay">
        <div id="game-container">
            <div id="story-text"></div>
            <div class="options-grid" id="options-container"></div>
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        // 1. DATA STATE & INVENTORY
        let inventory = {
            hasSilverKey: false, hasCarKey: false, hasLocation: false, hasJournal: false,
            hasFlower: false, hasMusic: false, hasCafe: false, hasUni: false
        };

        const invItems = document.getElementById('inv-items');
        function updateInventoryUI() {
            let items = [];
            if (inventory.hasSilverKey) items.push('مفتاح فضي');
            if (inventory.hasCarKey) items.push('مفتاح سيارة');
            if (inventory.hasLocation) items.push('إحداثيات المسافة');
            if (inventory.hasJournal) items.push('مذكرات');
            if (inventory.hasFlower) items.push('زهرة');
            if (inventory.hasMusic) items.push('ذوق فني');
            if (inventory.hasCafe) items.push('طلب المقهى');
            if (inventory.hasUni) items.push('سجل أكاديمي');
            invItems.innerHTML = items.length ? items.map(i => `<span class="inv-item">${i}</span>`).join('') : '<span style="color:#666; font-weight:400;">لا يوجد أدلة</span>';
        }

        // 2. THREE.JS BOILERPLATE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202); // Deep dark
        scene.fog = new THREE.FogExp2(0x020202, 0.02);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // POST PROCESSING (Bloom)
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.8;
        bloomPass.radius = 0.5;

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05); // Barely visible global
        scene.add(ambientLight);

        // 3. ADVANCED MATERIALS
        const floorMat = new THREE.MeshPhysicalMaterial({
            color: 0x050505,
            metalness: 0.8,
            roughness: 0.1, // Highly reflective mirror floor
            clearcoat: 1.0,
            clearcoatRoughness: 0.05
        });

        const wallMat = new THREE.MeshStandardMaterial({
            color: 0x111115,
            roughness: 0.8,
            metalness: 0.3
        });

        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.05,
            transmission: 1.0, // Glass effect
            thickness: 1.5,
            ior: 1.5,
            clearcoat: 1.0
        });

        const emissiveMat = new THREE.MeshBasicMaterial({ color: 0xff8c00 }); // Warm amber

        // 4. MAP GENERATION (Abstract Museum)
        const BLOCK_SIZE = 8;
        const wallsAABB = [];
        const interactables = [];

        // Simplified layout focusing on sleek modern museum flow
        const mapGrid = [
            "#######",
            "#..C..#",
            "#.....#",
            "###.###",
            "#.....#",
            "#.B.S.#",
            "#.....#",
            "###.###",
            "#.....#",
            "#.W.+T#", // + spawn
            "#.....#",
            "###.###",
            "#.....#",
            "#.D.A.#",
            "#.....#",
            "###.###",
            "#..F..#",
            "#######"
        ];

        function createAbstractGeometry(char) {
            switch (char) {
                case 'W': return new THREE.IcosahedronGeometry(1.5, 0); // Table/Keys
                case 'T': return new THREE.TorusKnotGeometry(1.2, 0.4, 64, 8); // Car
                case 'B': return new THREE.BoxGeometry(2, 2.5, 0.5); // Diary
                case 'S': return new THREE.SphereGeometry(2, 32, 32); // Screen
                case 'D': return new THREE.TetrahedronGeometry(2); // Cafe
                case 'A': return new THREE.CylinderGeometry(1, 1.5, 2.5, 32); // Podium
                case 'C': return new THREE.ConeGeometry(1.5, 3, 4); // Cat
                case 'F': return new THREE.DodecahedronGeometry(1.5); // Flower
                default: return new THREE.BoxGeometry(2, 2, 2);
            }
        }

        const wallGeo = new THREE.BoxGeometry(BLOCK_SIZE, 50, BLOCK_SIZE);
        const floorGeo = new THREE.PlaneGeometry(BLOCK_SIZE, BLOCK_SIZE);

        let spawnX = 0, spawnZ = 0;
        const rowCount = mapGrid.length;
        const colCount = mapGrid[0].length;
        const offsetX = - (colCount * BLOCK_SIZE) / 2;
        const offsetZ = - (rowCount * BLOCK_SIZE) / 2;

        for (let r = 0; r < rowCount; r++) {
            for (let c = 0; c < colCount; c++) {
                const char = mapGrid[r][c];
                const x = offsetX + (c * BLOCK_SIZE) + (BLOCK_SIZE / 2);
                const z = offsetZ + (r * BLOCK_SIZE) + (BLOCK_SIZE / 2);

                if (char === ' ') continue;

                // Glossy Mirror Floor
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = - Math.PI / 2;
                floor.position.set(x, 0, z);
                scene.add(floor);

                if (char === '#') {
                    // Huge imposing black monolith walls
                    const wall = new THREE.Mesh(wallGeo, wallMat);
                    wall.position.set(x, 25, z);
                    scene.add(wall);
                    wallsAABB.push({
                        minX: x - BLOCK_SIZE / 2, maxX: x + BLOCK_SIZE / 2,
                        minZ: z - BLOCK_SIZE / 2, maxZ: z + BLOCK_SIZE / 2
                    });
                } else {
                    if (char === '+') { spawnX = x; spawnZ = z; }

                    // Abstract Interactive Artifacts
                    if (char.match(/[WTBSDAFC]/)) {
                        let node;
                        if (char === 'W') node = 1;
                        if (char === 'T') node = 6;
                        if (char === 'B') node = 8;
                        if (char === 'S') node = 30;
                        if (char === 'D') node = 40;
                        if (char === 'A') node = 60;
                        if (char === 'F') node = 11;
                        if (char === 'C') node = 13;

                        let wrapper = new THREE.Group();
                        let baseY = 3;
                        wrapper.position.set(x, baseY, z);

                        let geo = createAbstractGeometry(char);

                        // Beautiful frosted glass exterior
                        let glassMesh = new THREE.Mesh(geo, glassMat);
                        wrapper.add(glassMesh);

                        // Glowing inner core inside the glass
                        let coreGeo = geo.clone();
                        coreGeo.scale(0.3, 0.3, 0.3);
                        let coreMesh = new THREE.Mesh(coreGeo, emissiveMat);
                        wrapper.add(coreMesh);

                        // Dynamic point light emitting from the glass
                        let pLight = new THREE.PointLight(0xffaa00, 2, 20);
                        wrapper.add(pLight);

                        wrapper.userData = { baseY: baseY, time: Math.random() * 100 };
                        scene.add(wrapper);

                        // Invisible bounding box for raycaster
                        let hitGeo = new THREE.BoxGeometry(4, 4, 4);
                        let hitMat = new THREE.MeshBasicMaterial({ visible: false });
                        let hitBox = new THREE.Mesh(hitGeo, hitMat);
                        hitBox.position.set(x, baseY, z);
                        hitBox.userData = { nodeId: node, wrapper: wrapper };
                        scene.add(hitBox);
                        interactables.push(hitBox);

                        // Physical blocker
                        wallsAABB.push({
                            minX: x - 2, maxX: x + 2,
                            minZ: z - 2, maxZ: z + 2
                        });
                    }
                }
            }
        }

        // 5. CONTROLS & PHYSICS
        const controls = new THREE.PointerLockControls(camera, document.body);
        camera.position.set(spawnX, 4, spawnZ);

        const instructions = document.getElementById('instruction-screen');
        const startBtn = document.getElementById('start-btn');
        let isGamePaused = false;

        startBtn.addEventListener('click', () => {
            instructions.style.display = 'none';
            controls.lock();
        });

        document.body.addEventListener('click', () => {
            if (isGamePaused) return;

            if (controls.isLocked) {
                if (hoverObject) openDialog(hoverObject.userData.nodeId);
            } else if (instructions.style.display === 'none') {
                controls.lock();
            }
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', e => {
            switch (e.code) {
                case 'ArrowUp': case 'KeyW': keys.w = true; break;
                case 'ArrowLeft': case 'KeyA': keys.a = true; break;
                case 'ArrowDown': case 'KeyS': keys.s = true; break;
                case 'ArrowRight': case 'KeyD': keys.d = true; break;
            }
        });
        document.addEventListener('keyup', e => {
            switch (e.code) {
                case 'ArrowUp': case 'KeyW': keys.w = false; break;
                case 'ArrowLeft': case 'KeyA': keys.a = false; break;
                case 'ArrowDown': case 'KeyS': keys.s = false; break;
                case 'ArrowRight': case 'KeyD': keys.d = false; break;
            }
        });

        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        const SPEED = 35.0;
        const PLAYER_RADIUS = 1.0;

        function checkCollision(nx, nz) {
            for (let wall of wallsAABB) {
                if (nx + PLAYER_RADIUS > wall.minX && nx - PLAYER_RADIUS < wall.maxX &&
                    nz + PLAYER_RADIUS > wall.minZ && nz - PLAYER_RADIUS < wall.maxZ) {
                    return true;
                }
            }
            return false;
        }

        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const centerPoint = new THREE.Vector2(0, 0);
        let hoverObject = null;
        const toast = document.getElementById('interaction-toast');

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const timeNow = Date.now() * 0.002;

            // Animate beautiful floating abstract shapes
            for (let hitBox of interactables) {
                let wrapper = hitBox.userData.wrapper;
                if (wrapper.visible) {
                    wrapper.position.y = wrapper.userData.baseY + Math.sin(timeNow + wrapper.userData.time) * 0.4;
                    wrapper.rotation.y += delta * 0.3;
                    wrapper.rotation.z += delta * 0.2;
                }
            }

            if (controls.isLocked && !isGamePaused) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(keys.w) - Number(keys.s);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize();

                if (keys.w || keys.s) velocity.z -= direction.z * SPEED * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * SPEED * delta;

                let currentPos = controls.getObject().position;
                let nextX = currentPos.x + (velocity.x * delta);
                if (!checkCollision(nextX, currentPos.z)) { currentPos.x = nextX; }
                else { velocity.x = 0; }

                let nextZ = currentPos.z + (velocity.z * delta);
                if (!checkCollision(currentPos.x, nextZ)) { currentPos.z = nextZ; }
                else { velocity.z = 0; }

                // Raycasting
                raycaster.setFromCamera(centerPoint, camera);
                let activeHits = interactables.filter(i => i.userData.wrapper.visible);
                const intersects = raycaster.intersectObjects(activeHits);

                if (intersects.length > 0 && intersects[0].distance < 12) {
                    hoverObject = intersects[0].object;
                    toast.style.display = 'block';
                    document.getElementById('crosshair').style.transform = 'translate(-50%, -50%) scale(1.5)';
                } else {
                    hoverObject = null;
                    toast.style.display = 'none';
                    document.getElementById('crosshair').style.transform = 'translate(-50%, -50%) scale(1)';
                }
            }

            composer.render(); // Use composer for Bloom instead of renderer
        }

        // 6. DOM NODE LOGIC (Sleek UI)
        const overlay = document.getElementById('overlay');
        const storyTextElement = document.getElementById('story-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackElement = document.getElementById('feedback');
        let typingTimeout;
        let isTyping = false;

        const nodes = {
            1: {
                text: "أنت تقف أمام مجسم زجاجي معقد، ينبض بداخله ضوء دافئ. هل تستخرج المفاتيح من داخله؟",
                choices: [
                    { text: "استخراج المفتاح الفضي", action: () => inventory.hasSilverKey = true, next: 3, condition: () => !inventory.hasSilverKey },
                    { text: "استخراج مفتاح النظام", action: () => inventory.hasCarKey = true, next: 4, condition: () => !inventory.hasCarKey },
                    { text: "التراجع", action: () => closeDialog() }
                ]
            },
            3: { text: "احتفظت بالمفتاح الفضي بأمان.", choices: [{ text: "العودة", next: 1 }] },
            4: { text: "احتفظت بمفتاح النظام.", choices: [{ text: "العودة", next: 1 }] },
            6: {
                text: "مجسم حلقي انسيابي يبدو وكأنه وحدة تحكم بمركبة.",
                choices: [
                    { text: "تفعيل النظام", next: 7, condition: () => inventory.hasCarKey },
                    { text: "إغلاق", action: () => closeDialog() }
                ]
            },
            7: {
                text: "النظام يطلب تحديد الإحداثيات النفسية للمسافة العاطفية:",
                choices: [
                    { text: "إلينوي (Illinois)", next: 99 },
                    { text: "إنديانا (Indiana)", action: () => inventory.hasLocation = true, next: 10 },
                    { text: "أوهايو (Ohio)", next: 99 }
                ]
            },

        function closeDialog() {
            isGamePaused = false;
            overlay.style.display = 'none';
            toast.style.display = 'none';
            hoverObject = null;
            updateInventoryUI();
            controls.lock();
        }

        function openDialog(nodeId) {
            controls.unlock();
            isGamePaused = true;
            overlay.style.display = 'flex';
            toast.style.display = 'none';
            renderNode(nodeId);
        }

        function renderNode(nodeId) {
            if (nodeId === 23) { showFinalLetter(); return; }

            const node = nodes[nodeId];
            feedbackElement.innerText = '';
            optionsContainer.innerHTML = '';
            isTyping = true;

            typeWriterEffect(node.text, () => {
                isTyping = false;
                node.choices.forEach((choice, index) => {
                    if (choice.condition && !choice.condition()) return;

                    const btn = document.createElement('button');
                    btn.innerText = choice.text;
                    btn.classList.add('option-btn');
                    btn.style.animationDelay = `${index * 0.15}s`;

                    btn.onclick = () => {
                        if (isTyping) return;
                        if (choice.next === 99) {
                            feedbackElement.innerText = "عدم تطابق في البصمة العاطفية، تم الرفض.";
                            btn.style.transform = "translateX(10px) scale(0.98)";
                            setTimeout(() => btn.style.transform = "translateX(0) scale(1)", 150);
                            setTimeout(() => { renderNode(99); }, 1400);
                        } else {
                            if (choice.action) choice.action();
                            if (choice.next) renderNode(choice.next);
                        }
                    };
                    optionsContainer.appendChild(btn);
                });
            });
        }

        function typeWriterEffect(text, callback) {
            storyTextElement.innerHTML = '';
            clearTimeout(typingTimeout);

            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    storyTextElement.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                    i++;
                    typingTimeout = setTimeout(typeWriter, 12);
                } else {
                    storyTextElement.innerHTML = text;
                    if (callback) callback();
                }
            }
            typeWriter();
        }
